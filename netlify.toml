# Netlify configuration for Next.js with next-intl

[build]
  command = "npm run build"

# Handle Next.js routing through the Netlify Next.js plugin
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/index"
  status = 200

[[redirects]]
  # Redirect root to default locale page (avoid 404 at /)
  from = "/"
  to = "/en"
  status = 200
